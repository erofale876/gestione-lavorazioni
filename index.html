<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DESANTIS LAB - Gestione Lavorazioni</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* --- VARIABILI E BASE --- */
:root {
    --bg: #0d0d0d; --bg-card: #161616; --bg-input: #1e1e1e;
    --orange: #e8692a; --orange-dim: #a84d1f;
    --text: #d4c4a8; --text-dim: #8a7a60;
    --border: #2a2a2a; --header-h: 150px;
}
*, *::after, *::before { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Share Tech Mono', monospace; font-size: 14px; 
    height: 100vh; display: flex; flex-direction: column;
}

/* --- LAYOUT FISSO (HEADER + TABS) --- */
.fixed-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h); background: var(--bg);
    z-index: 1000; border-bottom: 2px solid var(--orange);
}
.header { text-align: center; padding: 15px 10px 5px; }
.header-title { font-size: 20px; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
.tabs { display: grid; grid-template-columns: repeat(4, 1fr); background: #111; margin-top: 10px; }
.tab-btn { 
    padding: 15px 5px; cursor: pointer; border: none; background: none;
    color: var(--text-dim); font-family: inherit; font-size: 10px; font-weight: 700;
    text-transform: uppercase; border-bottom: 3px solid transparent;
}
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); background: rgba(232,105,42,0.05); }

/* --- AREA SCORREVOLE --- */
main { margin-top: var(--header-h); padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 50px; }
.panel { display: none; } .panel.active { display: block; }

/* --- FORM E CARD --- */
.section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 15px; margin-bottom: 20px; }
.edit-banner { display: none; background: rgba(232,105,42,0.15); border: 1px solid var(--orange); padding: 8px; margin-bottom: 15px; color: var(--orange); font-size: 12px; text-align: center; }
.edit-banner.show { display: block; }

.form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
.form-input, .form-select { 
    width: 100%; background: var(--bg-input); border: 1px solid var(--border); 
    border-radius: 3px; padding: 10px; color: var(--text); font-family: inherit; font-size: 13px;
}
.form-input:focus, .form-select:focus { border-color: var(--orange); outline: none; }

.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.btn { padding: 12px; font-family: inherit; font-weight: 700; border-radius: 3px; cursor: pointer; text-transform: uppercase; border: none; }
.btn-save { background: var(--orange); color: white; }
.btn-cancel { background: #333; color: #999; }

/* --- TABELLE E LISTE --- */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-card); }
table { width: 100%; border-collapse: collapse; min-width: 500px; }
th { background: #000; color: var(--orange); font-size: 10px; text-align: left; padding: 12px; text-transform: uppercase; }
td { padding: 12px; font-size: 12px; border-bottom: 1px solid #1a1a1a; color: #bbb; }
.btn-mod { color: #6ab0f0; background: none; border: none; cursor: pointer; margin-right: 10px; font-family: inherit; }
.btn-del { color: #e05050; background: none; border: none; cursor: pointer; font-family: inherit; }

/* --- STORICO WIP --- */
.search-box { margin-bottom: 15px; }
.search-input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--orange-dim); color: var(--orange); border-radius: 4px; font-family: inherit; }
.s-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 15px; margin-bottom: 15px; }
.s-name { font-weight: 700; color: #fff; font-size: 16px; margin-bottom: 5px; }
.wip-bar-bg { background: #333; height: 6px; border-radius: 3px; margin: 10px 0; overflow: hidden; }
.wip-bar-fill { background: var(--orange); height: 100%; transition: 0.5s; }
.timeline { margin: 15px 0; padding-left: 15px; border-left: 1px dashed var(--orange-dim); }
.t-item { font-size: 11px; margin-bottom: 8px; position: relative; }
.t-item::before { content: ''; position: absolute; left: -19px; top: 4px; width: 7px; height: 7px; background: var(--orange); border-radius: 50%; }
.s-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 15px; padding-top: 10px; border-top: 1px solid #222; }
.btn-print { background: #222; color: #fff; border: 1px solid #444; font-size: 9px; padding: 8px 2px; border-radius: 3px; cursor: pointer; text-transform: uppercase; }

#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; color: var(--orange); font-weight: 700; }

@media print {
    .fixed-top, .btn, .btn-row, .edit-banner, .search-box, .s-actions { display: none !important; }
    body { background: white; color: black; font-family: sans-serif; }
    main { margin: 0; padding: 0; }
    .s-card { border: 1px solid #ccc; page-break-inside: avoid; }
}
</style>
</head>
<body>

<div id="loading">OPERAZIONE IN CORSO...</div>

<div class="fixed-top">
    <div class="header">
        <div class="header-title">■ DESANTIS LAB</div>
        <div style="font-size: 9px; color: var(--text-dim); margin-top:3px">GESTIONE PRODUZIONE FALEGNAMERIA</div>
    </div>
    <div class="tabs">
        <button id="tab-c" class="tab-btn active" onclick="switchTab('contatti')">Contatti</button>
        <button id="tab-p" class="tab-btn" onclick="switchTab('produzione')">Produzione</button>
        <button id="tab-i" class="tab-btn" onclick="switchTab('incassi')">Incassi</button>
        <button id="tab-s" class="tab-btn" onclick="switchTab('storico')">Storico</button>
    </div>
</div>

<main id="main-content">
    <section id="panel-contatti" class="panel active">
        <div class="section-card">
            <div class="edit-banner" id="c-banner">MODIFICA ANAGRAFICA CLIENTE</div>
            <input type="hidden" id="c-eid">
            <div class="form-group"><label class="form-label">Data</label><input type="date" id="c-data" class="form-input"></div>
            <div class="form-group"><label class="form-label">Cliente</label><input type="text" id="c-cliente" class="form-input" placeholder="Nome Cliente"></div>
            <div class="form-group"><label class="form-label">Tipo Lavoro</label>
                <select id="c-tipo" class="form-select">
                    <option>Porte Interne</option><option>Portoncino</option><option>Infissi</option><option>Scale</option>
                    <option>Armadi</option><option>Cucina</option><option>Restauro</option><option>Altro</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Prezzo Totale (€)</label><input type="number" id="c-valore" class="form-input"></div>
            <div class="form-group"><label class="form-label">Stato Commessa</label>
                <select id="c-stato" class="form-select">
                    <option>Contatto</option><option>Preventivo</option><option>In Lavorazione</option><option>Consegnato</option><option>Fatturato</option>
                </select>
            </div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetFormC()">Annulla</button>
                <button class="btn btn-save" onclick="saveC()">Salva Cliente</button>
            </div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Lavoro</th><th>Prezzo</th><th>Azioni</th></tr></thead><tbody id="tbody-c"></tbody></table></div>
    </section>

    <section id="panel-produzione" class="panel">
        <div class="section-card">
            <div class="edit-banner" id="p-banner">MODIFICA REGISTRO PRODUZIONE</div>
            <input type="hidden" id="p-eid">
            <div class="form-group"><label class="form-label">Data</label><input type="date" id="p-data" class="form-input"></div>
            <div class="form-group"><label class="form-label">Seleziona Lavoro Attivo</label><select id="p-commessa" class="form-select"></select></div>
            <div class="form-group"><label class="form-label">Operazione Svolta (Standard)</label>
                <select id="p-operazione-std" class="form-select">
                    <option value="">-- Scegli Lavorazione --</option>
                    <option>Taglio e Sezionatura</option><option>Bordatura</option><option>Levigatura</option>
                    <option>Verniciatura / Laccatura</option><option>Assemblaggio / Incollaggio</option>
                    <option>Ferramenta (Cerniere/Guide)</option><option>Restauro / Ripristino</option>
                    <option>Montaggio Esterno</option><option>Rilievo Misure</option><option value="Altro">Altro (Specifica nelle note)</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Note / Dettagli Operazione</label><input type="text" id="p-note" class="form-input" placeholder="Es: Colore RAL 7016 o Misure piano"></div>
            <div class="form-group"><label class="form-label">Operatore</label>
                <select id="p-operatore" class="form-select">
                    <option>Titolare Desantis</option><option>Dipendente Nazzareno</option>
                    <option>Dipendente B</option><option>Terzista con fattura</option><option>Altro</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Ore Lavorate</label><input type="number" id="p-ore" class="form-input" step="0.5"></div>
            <div class="form-group"><label class="form-label">% Avanzamento Totale</label><input type="number" id="p-av" class="form-input" placeholder="0-100"></div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetFormP()">Annulla</button>
                <button class="btn btn-save" onclick="saveP()">Registra Produzione</button>
            </div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Cliente</th><th>Cosa</th><th>Ore</th><th>Azioni</th></tr></thead><tbody id="tbody-p"></tbody></table></div>
    </section>

    <section id="panel-incassi" class="panel">
        <div class="section-card">
            <div class="edit-banner" id="i-banner">MODIFICA INCASSO</div>
            <input type="hidden" id="i-eid">
            <div class="form-group"><label class="form-label">Data</label><input type="date" id="i-data" class="form-input"></div>
            <div class="form-group"><label class="form-label">Cliente</label><select id="i-commessa" class="form-select"></select></div>
            <div class="form-group"><label class="form-label">Importo Incassato (€)</label><input type="number" id="i-incasso" class="form-input"></div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetFormI()">Annulla</button>
                <button class="btn btn-save" onclick="saveI()">Registra Incasso</button>
            </div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Cliente</th><th>Importo</th><th>Azioni</th></tr></thead><tbody id="tbody-i"></tbody></table></div>
    </section>

    <section id="panel-storico" class="panel">
        <div class="search-box"><input type="text" id="search-input" class="search-input" placeholder="Cerca cliente..." oninput="renderStorico()"></div>
        <button class="btn btn-save" style="width:100%; margin-bottom:15px; font-size:11px" onclick="printGenerale()">⎙ STAMPA RAPPORTO GENERALE OFFICINA</button>
        <div id="storico-list"></div>
    </section>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://uyzfhilwtikrjqgylxwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5emZoaWx3dGlrcmpxZ3lseHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTYwNDcsImV4cCI6MjA5MDg5MjA0N30._tmP4XpZnK9Wmc3AkkZd52hM_xrmMHIK2EjGTB3xYfQ');

const $ = id => document.getElementById(id);
const loading = on => $('loading').style.display = on ? 'flex' : 'none';
const today = () => new Date().toISOString().split('T')[0];

// --- NAV ---
window.switchTab = async (n) => {
    document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
    $('panel-'+n).classList.add('active'); $('tab-'+n.charAt(0)).classList.add('active');
    $('main-content').scrollTop = 0; // Torna su allo switch
    if(n==='contatti') renderC();
    if(n==='produzione') { await fillSels('p-commessa'); renderP(); }
    if(n==='incassi') { await fillSels('i-commessa'); renderI(); }
    if(n==='storico') renderStorico();
};

async function fillSels(id) {
    const {data} = await sb.from('contatti').select('id,cliente').order('cliente');
    $(id).innerHTML = '<option value="">-- Seleziona --</option>' + (data||[]).map(r => `<option value="${r.id}">${r.cliente}</option>`).join('');
}

// --- LOGICA CONTATTI ---
window.saveC = async () => {
    const id = $('c-eid').value;
    const obj = { data: $('c-data').value, cliente: $('c-cliente').value, tipo_lavoro: $('c-tipo').value, valore: parseFloat($('c-valore').value), stato: $('c-stato').value };
    if(!obj.cliente) return alert('Inserisci il nome cliente');
    loading(true);
    if(id) await sb.from('contatti').update(obj).eq('id', id);
    else await sb.from('contatti').insert(obj);
    resetFormC(); await renderC(); loading(false);
};
window.editC = async id => {
    const {data} = await sb.from('contatti').select('*').eq('id', id).single();
    $('c-eid').value = data.id; $('c-data').value = data.data; $('c-cliente').value = data.cliente;
    $('c-tipo').value = data.tipo_lavoro; $('c-valore').value = data.valore; $('c-stato').value = data.stato;
    $('c-banner').classList.add('show'); switchTab('contatti');
};
window.resetFormC = () => { $('c-eid').value = ''; $('c-cliente').value = ''; $('c-valore').value = ''; $('c-banner').classList.remove('show'); $('c-data').value = today(); };
async function renderC() {
    const {data} = await sb.from('contatti').select('*').order('id', {ascending:false});
    $('tbody-c').innerHTML = (data||[]).map(r => `<tr><td>${r.cliente}</td><td>${r.tipo_lavoro}</td><td>€ ${r.valore}</td><td><button class="btn-mod" onclick="editC(${r.id})">Mod</button><button class="btn-del" onclick="delC(${r.id})">✕</button></td></tr>`).join('');
}
window.delC = async id => { if(confirm('Eliminare cliente?')) { await sb.from('contatti').delete().eq('id', id); renderC(); } };

// --- LOGICA PRODUZIONE ---
window.saveP = async () => {
    const id = $('p-eid').value;
    const operazioneDettaglio = `${$('p-operazione-std').value} - ${$('p-note').value}`;
    const obj = { 
        data: $('p-data').value, 
        contatto_id: $('p-commessa').value, 
        prodotto: operazioneDettaglio, // Mappa su colonna prodotto
        operazione: operazioneDettaglio, // Mappa su colonna operazione (doppia sicurezza)
        operatore: $('p-operatore').value, 
        ore_lavorate: parseFloat($('p-ore').value), 
        avanzamento: parseInt($('p-av').value) 
    };
    if(!obj.contatto_id) return alert('Seleziona un cliente');
    loading(true);
    if(id) await sb.from('produzione').update(obj).eq('id', id);
    else await sb.from('produzione').insert(obj);
    resetFormP(); await renderP(); loading(false);
};
window.editP = async id => {
    const {data} = await sb.from('produzione').select('*').eq('id', id).single();
    await fillSels('p-commessa');
    $('p-eid').value = data.id; $('p-data').value = data.data; $('p-commessa').value = data.contatto_id;
    $('p-note').value = (data.prodotto || data.operazione || ''); 
    $('p-operatore').value = data.operatore; $('p-ore').value = data.ore_lavorate; $('p-av').value = data.avanzamento;
    $('p-banner').classList.add('show'); switchTab('produzione');
};
window.resetFormP = () => { $('p-eid').value = ''; $('p-ore').value = ''; $('p-av').value = ''; $('p-note').value = ''; $('p-banner').classList.remove('show'); $('p-data').value = today(); };
async function renderP() {
    const {data} = await sb.from('produzione').select('*, contatti(cliente)').order('id', {ascending:false});
    $('tbody-p').innerHTML = (data||[]).map(r => `<tr><td>${r.data}</td><td>${r.contatti?.cliente}</td><td>${r.prodotto || r.operazione || '---'}</td><td>${r.ore_lavorate}h</td><td><button class="btn-mod" onclick="editP(${r.id})">Mod</button><button class="btn-del" onclick="delP(${r.id})">✕</button></td></tr>`).join('');
}
window.delP = async id => { if(confirm('Elimina riga?')) { await sb.from('produzione').delete().eq('id', id); renderP(); } };

// --- LOGICA INCASSI ---
window.saveI = async () => {
    const id = $('i-eid').value;
    const obj = { data: $('i-data').value, contatto_id: $('i-commessa').value, incasso: parseFloat($('i-incasso').value) };
    loading(true);
    if(id) await sb.from('uscite').update(obj).eq('id', id);
    else await sb.from('uscite').insert(obj);
    resetFormI(); await renderI(); loading(false);
};
window.editI = async id => {
    const {data} = await sb.from('uscite').select('*').eq('id', id).single();
    await fillSels('i-commessa');
    $('i-eid').value = data.id; $('i-data').value = data.data; $('i-commessa').value = data.contatto_id; $('i-incasso').value = data.incasso;
    $('i-banner').classList.add('show'); switchTab('incassi');
};
window.resetFormI = () => { $('i-eid').value = ''; $('i-incasso').value = ''; $('i-banner').classList.remove('show'); $('i-data').value = today(); };
async function renderI() {
    const {data} = await sb.from('uscite').select('*, contatti(cliente)').order('id', {ascending:false});
    $('tbody-i').innerHTML = (data||[]).map(r => `<tr><td>${r.data}</td><td>${r.contatti?.cliente}</td><td>€ ${r.incasso}</td><td><button class="btn-mod" onclick="editI(${r.id})">Mod</button><button class="btn-del" onclick="delI(${r.id})">✕</button></td></tr>`).join('');
}
window.delI = async id => { if(confirm('Elimina?')) { await sb.from('uscite').delete().eq('id', id); renderI(); } };

// --- STORICO WIP E STAMPE ---
async function renderStorico() {
    loading(true);
    const filter = $('search-input').value.toLowerCase();
    const {data: c} = await sb.from('contatti').select('*').order('cliente');
    const {data: p} = await sb.from('produzione').select('*').order('data');
    const {data: i} = await sb.from('uscite').select('*');

    $('storico-list').innerHTML = c.filter(x => x.cliente.toLowerCase().includes(filter)).map(cl => {
        const logs = p.filter(lx => lx.contatto_id === cl.id);
        const inc = i.filter(ix => ix.contatto_id === cl.id).reduce((a,b)=>a+b.incasso, 0);
        const oreTot = logs.reduce((a,b)=>a+b.ore_lavorate, 0);
        const avMax = logs.length > 0 ? Math.max(...logs.map(l => l.avanzamento)) : 0;
        
        return `
        <div class="s-card">
            <div class="s-name">${cl.cliente} <small style="font-size:9px; color:var(--orange)">[${cl.stato}]</small></div>
            <div style="font-size:11px">${cl.tipo_lavoro} - Ore Totali: ${oreTot}h</div>
            <div class="wip-bar-bg"><div class="wip-bar-fill" style="width:${avMax}%"></div></div>
            <div style="font-size:10px; text-align:right">${avMax}% completato</div>
            <div class="timeline">
                ${logs.map(l => `<div class="t-item"><b>${l.data}</b>: ${l.prodotto || l.operazione} (${l.operatore})</div>`).join('')}
            </div>
            <div style="font-size:11px; color:#fff">Pagato: € ${inc} / € ${cl.valore}</div>
            <div class="s-actions">
                <button class="btn-print" onclick="printSingolo(${cl.id}, 'sintetica')">Sintetica</button>
                <button class="btn-print" onclick="printSingolo(${cl.id}, 'tecnica')">Dettagliata</button>
                <button class="btn-print" style="color:var(--orange)" onclick="editC(${cl.id})">Modifica</button>
            </div>
        </div>`;
    }).join('');
    loading(false);
}

window.printSingolo = async (id, tipo) => {
    const {data:c} = await sb.from('contatti').select('*').eq('id',id).single();
    const {data:p} = await sb.from('produzione').select('*').eq('contatto_id',id).order('data');
    const {data:i} = await sb.from('uscite').select('*').eq('contatto_id',id);
    const incTot = i.reduce((a,b)=>a+b.incasso,0);
    const oreTot = p.reduce((a,b)=>a+b.ore_lavorate,0);
    
    let win = window.open('', '_blank');
    let html = `<html><head><title>Stampa ${c.cliente}</title><style>body{font-family:sans-serif;padding:30px} table{width:100%;border-collapse:collapse;margin-top:20px} th,td{border:1px solid #ccc;padding:10px;text-align:left}</style></head><body>`;
    html += `<h1>${c.cliente} - SCHEDA ${tipo.toUpperCase()}</h1>`;
    html += `<p>Lavoro: ${c.tipo_lavoro} | Data Inizio: ${c.data} | <b>Prezzo: € ${c.valore}</b></p>`;
    
    if(tipo === 'tecnica') {
        html += `<h3>DIARIO TECNICO LAVORAZIONI</h3><table><tr><th>Data</th><th>Operatore</th><th>Descrizione</th><th>Ore</th></tr>`;
        p.forEach(r => html += `<tr><td>${r.data}</td><td>${r.operatore}</td><td>${r.prodotto || r.operazione}</td><td>${r.ore_lavorate}</td></tr>`);
        html += `</table><p><b>Totale Ore: ${oreTot}h</b></p>`;
    } else {
        html += `<div style="border:2px solid #000; padding:20px; margin-top:20px">`;
        html += `<h3>RIEPILOGO ECONOMICO</h3><p>Totale Incassato: € ${incTot}</p>`;
        html += `<p><b>SALDO RIMANENTE: € ${c.valore - incTot}</b></p>`;
        html += `<p>Stato Lavorazione: ${p.length ? p[p.length-1].avanzamento : 0}%</p></div>`;
    }
    html += `<br><button onclick="window.print()">STAMPA PDF</button></body></html>`;
    win.document.write(html); win.document.close();
};

window.printGenerale = async () => {
    const {data} = await sb.from('contatti').select('*').order('cliente');
    let win = window.open('', '_blank');
    let html = `<html><head><style>body{font-family:sans-serif} table{width:100%;border-collapse:collapse} th,td{border:1px solid #000;padding:8px}</style></head><body>`;
    html += `<h2>RAPPORTO GENERALE PRODUZIONE DESANTIS</h2><table><tr><th>Cliente</th><th>Lavoro</th><th>Valore</th><th>Stato</th></tr>`;
    data.forEach(r => html += `<tr><td>${r.cliente}</td><td>${r.tipo_lavoro}</td><td>€ ${r.valore}</td><td>${r.stato}</td></tr>`);
    html += `</table><br><button onclick="window.print()">STAMPA ELENCO</button></body></html>`;
    win.document.write(html); win.document.close();
};

// Start
$('c-data').value = today();
$('p-data').value = today();
$('i-data').value = today();
renderC();
</script>
