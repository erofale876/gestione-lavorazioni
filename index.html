<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Lavorazioni – Falegnameria Desantis</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ... (Stili CSS identici alla versione precedente per mantenere la coerenza visiva) ... */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #1a1208; --bg2: #211608; --bg3: #2a1c0a; --card: #1e1507; --border: #3a2510; --border2: #4a3015; --orange: #e8692a; --orange2: #ff7c3a; --text: #d4c4a8; --text2: #a08060; --text3: #604030; --mono: 'Share Tech Mono', monospace; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; min-height: 100vh; }
.header { text-align: center; padding: 20px 16px 16px; border-bottom: 2px solid var(--orange); background: linear-gradient(180deg, #0d0902 0%, var(--bg) 100%); }
.header-title { font-size: 24px; font-weight: 700; color: var(--orange); letter-spacing: .12em; text-transform: uppercase; }
.tabs { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border-bottom: 2px solid var(--border2); background: var(--bg2); }
.tab-btn { padding: 14px 8px; cursor: pointer; font-family: var(--mono); font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text2); background: none; border: none; border-bottom: 3px solid transparent; }
.tab-btn.active { color: var(--orange); border-bottom: 3px solid var(--orange); background: rgba(232, 105, 42, .04); }
main { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
.panel { display: none; }
.panel.active { display: block; }
.section-card { background: var(--card); border: 1px solid var(--border2); border-radius: 4px; padding: 20px; margin-bottom: 16px; }
.section-title { font-size: 14px; font-weight: 700; color: var(--orange); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text2); }
.form-input, .form-select, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 10px 12px; color: var(--text); font-family: var(--mono); }
.btn-save { background: var(--orange); color: #fff; border: 1px solid var(--orange); padding: 12px; cursor: pointer; font-weight: 700; border-radius: 3px; }
.table-wrap { border: 1px solid var(--border2); border-radius: 3px; overflow-x: auto; background: var(--bg2); }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 12px; font-size: 11px; color: var(--orange); text-align: left; text-transform: uppercase; border-bottom: 2px solid var(--orange); }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text2); font-size: 12px; }
.loading { position: fixed; inset: 0; background: rgba(10, 8, 4, .9); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 16px; }
.hidden { display: none; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#notif { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--orange); padding: 10px 18px; color: var(--orange); opacity: 0; transition: opacity .25s; z-index: 999; }
#notif.show { opacity: 1; }
</style>
</head>
<body>

<div class="loading hidden" id="loading">
    <div class="spinner"></div>
    <div style="font-size:12px;color:var(--text2)">ELABORAZIONE IN CORSO...</div>
</div>

<div id="notif"></div>

<div class="header">
    <div class="header-title">■ GESTIONE LAVORAZIONI</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('contatti',this)">■ CONTATTI</button>
    <button class="tab-btn" onclick="switchTab('produzione',this)">■ PRODUZIONE</button>
    <button class="tab-btn" onclick="switchTab('incassi',this)">■ INCASSI</button>
    <button class="tab-btn" onclick="switchTab('storico',this)">■ STORICO</button>
</div>

<main>
    <div id="panel-contatti" class="panel active">
        <div class="section-card">
            <div class="section-title">■ NUOVO CONTATTO</div>
            <input type="hidden" id="c-eid">
            <div class="form-row">
                <div class="form-group"><label class="form-label">Nome cliente</label><input type="text" id="c-cliente" class="form-input"></div>
                <div class="form-group">
                    <label class="form-label">Tipo di lavorazione</label>
                    <select id="c-tipo" class="form-select">
                        <option>Cucina</option><option>Armadio</option><option>Porte</option><option>Infissi</option><option>Altro</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Ore previste (se disponibili)</label><input type="number" id="c-ore-prev" class="form-input"></div>
                <div class="form-group"><label class="form-label">Preventivo (€)</label><input type="number" id="c-valore" class="form-input"></div>
            </div>
            <button class="btn-save" onclick="saveC()">SALVA CONTATTO</button>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Lavoro</th><th>Stato</th><th></th></tr></thead><tbody id="tbody-c"></tbody></table></div>
    </div>

    <div id="panel-produzione" class="panel">
        <div class="section-card">
            <div class="section-title">■ REGISTRO PRODUZIONE</div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Cliente</label><select id="p-commessa" class="form-select"></select></div>
                <div class="form-group">
                    <label class="form-label">Operazione Svolta</label>
                    <select id="p-prodotto" class="form-select">
                        <option>Taglio e Sezionatura</option>
                        <option>Bordatura</option>
                        <option>Levigatura</option>
                        <option>Verniciatura</option>
                        <option>Assemblaggio</option>
                        <option>Ferramenta</option>
                        <option>Montaggio Esterno</option>
                        <option>Altro</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Ore oggi</label><input type="number" id="p-ore" class="form-input" step="0.5"></div>
                <div class="form-group">
                    <label class="form-label">Operatore</label>
                    <select id="p-operatore" class="form-select">
                        <option>Titolare</option><option>Nazzareno</option><option>Altro</option>
                    </select>
                </div>
            </div>
            <button class="btn-save" onclick="saveP()">REGISTRA LAVORO</button>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Cliente</th><th>Operazione</th><th>Ore</th><th></th></tr></thead><tbody id="tbody-p"></tbody></table></div>
    </div>

    <div id="panel-incassi" class="panel"><div class="section-card"><div class="section-title">■ INCASSI</div><div id="tbody-i">Caricamento...</div></div></div>
    <div id="panel-storico" class="panel"><div class="section-card"><div class="section-title">■ RIEPILOGO</div><div id="storico-grid">Caricamento...</div></div></div>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPA_URL = 'https://uyzfhilwtikrjqgylxwg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5emZoaWx3dGlrcmpxZ3lseHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTYwNDcsImV4cCI6MjA5MDg5MjA0N30._tmP4XpZnK9Wmc3AkkZd52hM_xrmMHIK2EjGTB3xYfQ';
const sb = createClient(SUPA_URL, SUPA_KEY);

function loading(show) { document.getElementById('loading').classList.toggle('hidden', !show); }
function notify(m) { const n = document.getElementById('notif'); n.textContent = m; n.classList.add('show'); setTimeout(() => n.classList.remove('show'), 3000); }

// SISTEMA DI SALVATAGGIO RESILIENTE (FIX CLAUDE)
async function safeSave(table, payload, id = null) {
    loading(true);
    try {
        let result;
        if (id) {
            result = await sb.from(table).update(payload).eq('id', id);
        } else {
            result = await sb.from(table).insert(payload);
        }

        // Se l'errore dice che la colonna non esiste (codice 42703 o errore su 'ore_previste')
        if (result.error && (result.error.message.includes('ore_previste') || result.error.code === '42703')) {
            console.warn("Colonna ore_previste non trovata. Riprovo senza.");
            delete payload.ore_previste; // Rimuovo la colonna problematica
            if (id) {
                result = await sb.from(table).update(payload).eq('id', id);
            } else {
                result = await sb.from(table).insert(payload);
            }
        }

        if (result.error) throw result.error;
        notify("Salvataggio completato correttamente");
        return true;
    } catch (e) {
        console.error(e);
        alert("Errore: " + e.message);
        return false;
    } finally {
        loading(false);
    }
}

window.saveC = async () => {
    const payload = {
        cliente: document.getElementById('c-cliente').value,
        tipo_lavoro: document.getElementById('c-tipo').value,
        valore: parseFloat(document.getElementById('c-valore').value) || 0,
        ore_previste: parseFloat(document.getElementById('c-ore-prev').value) || 0,
        data: new Date().toISOString().split('T')[0]
    };
    const id = document.getElementById('c-eid').value;
    if (await safeSave('contatti', payload, id)) {
        document.getElementById('c-cliente').value = '';
        renderC();
    }
};

window.saveP = async () => {
    const payload = {
        contatto_id: document.getElementById('p-commessa').value,
        prodotto: document.getElementById('p-prodotto').value,
        ore_lavorate: parseFloat(document.getElementById('p-ore').value) || 0,
        operatore: document.getElementById('p-operatore').value,
        data: new Date().toISOString().split('T')[0]
    };
    if (await safeSave('produzione', payload)) renderP();
};

async function renderC() {
    const { data } = await sb.from('contatti').select('*').order('id', {ascending: false});
    document.getElementById('tbody-c').innerHTML = (data || []).map(r => `
        <tr><td>${r.cliente}</td><td>${r.tipo_lavoro}</td><td>${r.stato || 'Aperto'}</td>
        <td><button onclick="editC(${r.id})">✎</button></td></tr>
    `).join('');
    // Aggiorna select in produzione
    const sel = document.getElementById('p-commessa');
    sel.innerHTML = (data || []).map(r => `<option value="${r.id}">${r.cliente}</option>`).join('');
}

async function renderP() {
    const { data } = await sb.from('produzione').select('*, contatti(cliente)').order('data', {ascending: false});
    document.getElementById('tbody-p').innerHTML = (data || []).map(r => `
        <tr><td>${r.data}</td><td>${r.contatti?.cliente}</td><td>${r.prodotto}</td><td>${r.ore_lavorate}h</td><td></td></tr>
    `).join('');
}

window.switchTab = (name, btn) => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'contatti') renderC();
    if (name === 'produzione') renderP();
};

renderC();
</script>
</body>
</html>
