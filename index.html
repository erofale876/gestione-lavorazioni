<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestione Lavorazioni Desantis</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root { --bg: #0d0d0d; --bg-card: #161616; --bg-input: #1e1e1e; --orange: #e8692a; --text: #d4c4a8; --text-dim: #8a7a60; --border: #2a2a2a; --header-h: 140px; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 14px; overflow-x: hidden; }
.fixed-top { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: var(--bg); z-index: 1000; border-bottom: 2px solid var(--orange); }
.header { text-align: center; padding: 15px 10px 5px; }
.header-title { font-size: 22px; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
.tabs { display: grid; grid-template-columns: repeat(4, 1fr); background: #111; margin-top: 10px; }
.tab-btn { padding: 15px 5px; cursor: pointer; border: none; background: none; color: var(--text-dim); font-family: inherit; font-size: 11px; text-transform: uppercase; border-bottom: 3px solid transparent; }
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
main { margin-top: var(--header-h); padding: 15px; padding-bottom: 80px; }
.panel { display: none; } .panel.active { display: block; }
.section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 15px; margin-bottom: 20px; }
.form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
.form-input, .form-select { width: 100%; background: var(--bg-input); border: 1px solid var(--border); padding: 10px; color: var(--text); font-family: inherit; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.btn { padding: 12px; font-family: inherit; font-weight: 700; border-radius: 3px; cursor: pointer; text-transform: uppercase; border: none; }
.btn-save { background: var(--orange); color: white; }
.table-wrap { overflow-x: auto; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; min-width: 500px; }
th { background: #000; color: var(--orange); font-size: 10px; text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
td { padding: 10px; font-size: 12px; border-bottom: 1px solid #1a1a1a; color: #bbb; }
.search-box { margin-bottom: 15px; }
.search-input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--orange); color: var(--orange); font-family: inherit; }
.s-card { background: var(--bg-card); border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }
.timeline { margin: 10px 0; padding-left: 15px; border-left: 1px dashed var(--orange); font-size: 11px; }
#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; color: var(--orange); }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">CARICAMENTO...</div>

<div class="fixed-top">
    <div class="header">
        <div class="header-title">■ DESANTIS LAB</div>
    </div>
    <div class="tabs">
        <button id="tab-c" class="tab-btn active" onclick="switchTab('contatti')">Contatti</button>
        <button id="tab-p" class="tab-btn" onclick="switchTab('produzione')">Produzione</button>
        <button id="tab-i" class="tab-btn" onclick="switchTab('incassi')">Incassi</button>
        <button id="tab-s" class="tab-btn" onclick="switchTab('storico')">Storico</button>
    </div>
</div>

<main>
    <section id="panel-contatti" class="panel active">
        <div class="section-card">
            <input type="hidden" id="c-eid">
            <div class="form-group"><label class="form-label">Cliente</label><input type="text" id="c-cliente" class="form-input"></div>
            <div class="form-group"><label class="form-label">Lavoro</label><select id="c-tipo" class="form-select"><option>Porte</option><option>Infissi</option><option>Armadi</option><option>Altro</option></select></div>
            <div class="form-group"><label class="form-label">Prezzo (€)</label><input type="number" id="c-valore" class="form-input"></div>
            <div class="btn-row"><button class="btn btn-save" onclick="saveC()">Salva</button></div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Lavoro</th><th>Prezzo</th><th>Azioni</th></tr></thead><tbody id="tbody-c"></tbody></table></div>
    </section>

    <section id="panel-produzione" class="panel">
        <div class="section-card">
            <input type="hidden" id="p-eid">
            <div class="form-group"><label class="form-label">Cliente</label><select id="p-commessa" class="form-select"></select></div>
            <div class="form-group"><label class="form-label">Operazione Svolta</label>
                <select id="p-operazione" class="form-select">
                    <option value="">-- Seleziona --</option>
                    <option>Taglio e Sezionatura</option><option>Bordatura</option><option>Levigatura</option>
                    <option>Verniciatura</option><option>Assemblaggio</option><option>Ferramenta</option>
                    <option>Montaggio Esterno</option><option>Altro</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Chi?</label><select id="p-operatore" class="form-select"><option>Titolare</option><option>Nazzareno</option><option>Dipendente B</option><option>Altro</option></select></div>
            <div class="form-group"><label class="form-label">Ore</label><input type="number" id="p-ore" class="form-input"></div>
            <div class="form-group"><label class="form-label">% Avanzamento</label><input type="number" id="p-av" class="form-input"></div>
            <div class="btn-row"><button class="btn btn-save" onclick="saveP()">Registra</button></div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Cosa</th><th>Ore</th><th>Azioni</th></tr></thead><tbody id="tbody-p"></tbody></table></div>
    </section>

    <section id="panel-incassi" class="panel">
        <div class="section-card">
            <div class="form-group"><label class="form-label">Cliente</label><select id="i-commessa" class="form-select"></select></div>
            <div class="form-group"><label class="form-label">Importo Incassato (€)</label><input type="number" id="i-incasso" class="form-input"></div>
            <div class="btn-row"><button class="btn btn-save" onclick="saveI()">Registra Incasso</button></div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Cliente</th><th>Importo</th><th>Azioni</th></tr></thead><tbody id="tbody-i"></tbody></table></div>
    </section>

    <section id="panel-storico" class="panel">
        <div class="search-box"><input type="text" id="search-input" class="search-input" placeholder="Cerca..." oninput="renderStorico()"></div>
        <div id="storico-list"></div>
    </section>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://uyzfhilwtikrjqgylxwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5emZoaWx3dGlrcmpxZ3lseHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTYwNDcsImV4cCI6MjA5MDg5MjA0N30._tmP4XpZnK9Wmc3AkkZd52hM_xrmMHIK2EjGTB3xYfQ');

const $ = id => document.getElementById(id);
const loading = on => $('loading').style.display = on ? 'flex' : 'none';
const getToday = () => new Date().toISOString().split('T')[0];

window.switchTab = async (n) => {
    document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
    $('panel-'+n).classList.add('active'); $('tab-'+n.charAt(0)).classList.add('active');
    if(n==='contatti') renderC();
    if(n==='produzione') { fillSel('p-commessa'); renderP(); }
    if(n==='incassi') { fillSel('i-commessa'); renderI(); }
    if(n==='storico') renderStorico();
};

async function fillSel(id) {
    const {data} = await sb.from('contatti').select('id,cliente').order('cliente');
    $(id).innerHTML = (data||[]).map(r => `<option value="${r.id}">${r.cliente}</option>`).join('');
}

window.saveC = async () => {
    const obj = { cliente: $('c-cliente').value, tipo_lavoro: $('c-tipo').value, valore: $('c-valore').value, data: getToday() };
    loading(true); 
    try { await sb.from('contatti').insert(obj); renderC(); } catch(e) {}
    loading(false);
};

async function renderC() {
    const {data} = await sb.from('contatti').select('*').order('id', {ascending:false});
    $('tbody-c').innerHTML = (data||[]).map(r => `<tr><td>${r.cliente}</td><td>${r.tipo_lavoro}</td><td>${r.valore}</td><td><button onclick="delC(${r.id})">✕</button></td></tr>`).join('');
}
window.delC = async id => { if(confirm('Elimina?')) { await sb.from('contatti').delete().eq('id', id); renderC(); } };

window.saveP = async () => {
    const obj = { 
        contatto_id: $('p-commessa').value, 
        prodotto: $('p-operazione').value, 
        operatore: $('p-operatore').value, 
        ore_lavorate: $('p-ore').value, 
        avanzamento: $('p-av').value,
        data: getToday() 
    };
    loading(true); 
    try { await sb.from('produzione').insert(obj); renderP(); } catch(e) {}
    loading(false);
};

async function renderP() {
    const {data} = await sb.from('produzione').select('*, contatti(cliente)').order('id', {ascending:false});
    $('tbody-p').innerHTML = (data||[]).map(r => `<tr><td>${r.contatti?.cliente}</td><td>${r.prodotto}</td><td>${r.ore_lavorate}h</td><td><button onclick="delP(${r.id})">✕</button></td></tr>`).join('');
}
window.delP = async id => { if(confirm('Elimina?')) { await sb.from('produzione').delete().eq('id', id); renderP(); } };

window.saveI = async () => {
    const obj = { contatto_id: $('i-commessa').value, incasso: $('i-incasso').value, data: getToday() };
    loading(true);
    try { await sb.from('uscite').insert(obj); renderI(); } catch(e) {}
    loading(false);
};

async function renderI() {
    const {data} = await sb.from('uscite').select('*, contatti(cliente)').order('id', {ascending:false});
    $('tbody-i').innerHTML = (data||[]).map(r => `<tr><td>${r.data}</td><td>${r.contatti?.cliente}</td><td>€ ${r.incasso}</td><td><button onclick="delI(${r.id})">✕</button></td></tr>`).join('');
}
window.delI = async id => { if(confirm('Elimina?')) { await sb.from('uscite').delete().eq('id', id); renderI(); } };

async function renderStorico() {
    const {data: c} = await sb.from('contatti').select('*');
    const {data: p} = await sb.from('produzione').select('*');
    const search = $('search-input').value.toLowerCase();
    $('storico-list').innerHTML = c.filter(x => x.cliente.toLowerCase().includes(search)).map(cl => {
        const logs = p.filter(lx => lx.contatto_id === cl.id);
        return `<div class="s-card"><b>${cl.cliente}</b><div class="timeline">${logs.map(l => `<div>${l.data}: ${l.prodotto} (${l.operatore})</div>`).join('')}</div></div>`;
    }).join('');
}

renderC();
</script>
</body>
</html>
