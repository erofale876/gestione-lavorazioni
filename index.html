<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestione Lavorazioni Desantis</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* --- STILE BASE E VARIABILI --- */
:root {
    --bg: #0d0d0d; --bg-card: #161616; --bg-input: #1e1e1e;
    --orange: #e8692a; --orange-dim: #a84d1f;
    --text: #d4c4a8; --text-dim: #8a7a60;
    --border: #2a2a2a;
    --header-h: 140px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Share Tech Mono', monospace; font-size: 14px; 
    overflow-x: hidden; height: 100vh;
}

/* --- LAYOUT FISSO (HEADER E TABS) --- */
.fixed-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h); background: var(--bg);
    z-index: 1000; border-bottom: 2px solid var(--orange);
}
.header { text-align: center; padding: 15px 10px 5px; }
.header-title { font-size: 22px; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
.tabs { display: grid; grid-template-columns: repeat(4, 1fr); background: #111; margin-top: 10px; }
.tab-btn { 
    padding: 15px 5px; cursor: pointer; border: none; background: none;
    color: var(--text-dim); font-family: inherit; font-size: 11px; font-weight: 700;
    text-transform: uppercase; border-bottom: 3px solid transparent;
}
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); background: rgba(232,105,42,0.05); }

/* --- AREA SCORREVOLE (MAIN) --- */
main { margin-top: var(--header-h); padding: 15px; padding-bottom: 80px; }
.panel { display: none; } .panel.active { display: block; }

/* --- COMPONENTI UI --- */
.section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 15px; margin-bottom: 20px; }
.edit-banner { display: none; background: rgba(232,105,42,0.15); border: 1px solid var(--orange); padding: 8px; margin-bottom: 15px; color: var(--orange); font-size: 12px; text-align: center; }
.edit-banner.show { display: block; }

.form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
.form-input, .form-select, .form-textarea { 
    width: 100%; background: var(--bg-input); border: 1px solid var(--border); 
    border-radius: 3px; padding: 10px; color: var(--text); font-family: inherit; font-size: 13px;
}
.form-input:focus { border-color: var(--orange); outline: none; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.btn { padding: 12px; font-family: inherit; font-weight: 700; border-radius: 3px; cursor: pointer; text-transform: uppercase; border: none; }
.btn-save { background: var(--orange); color: white; }
.btn-cancel { background: #333; color: #999; }

/* --- TABELLE --- */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; }
table { width: 100%; border-collapse: collapse; min-width: 500px; }
th { background: #000; color: var(--orange); font-size: 10px; text-align: left; padding: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 10px; font-size: 12px; border-bottom: 1px solid #1a1a1a; color: #bbb; }
.btn-mod { color: #6ab0f0; background: none; border: none; cursor: pointer; font-size: 11px; margin-right: 8px; }
.btn-del { color: #e05050; background: none; border: none; cursor: pointer; font-size: 11px; }

/* --- STORICO E TIMELINE --- */
.s-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 15px; margin-bottom: 15px; }
.s-card-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 8px; }
.s-name { font-weight: 700; color: #fff; font-size: 15px; }
.timeline { margin: 15px 0; padding-left: 15px; border-left: 1px dashed var(--border); }
.timeline-item { position: relative; margin-bottom: 10px; font-size: 11px; }
.timeline-item::before { content: ''; position: absolute; left: -19px; top: 4px; width: 7px; height: 7px; border-radius: 50%; background: var(--orange); }
.t-date { color: var(--orange); font-weight: 700; margin-right: 5px; }
.s-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; border-top: 1px solid #222; padding-top: 12px; }
.btn-p { font-size: 9px; padding: 6px; background: #222; color: #ddd; border: 1px solid #333; border-radius: 3px; cursor: pointer; text-align: center; }

/* --- LOADING E ANIMAZIONE --- */
#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
#notif { position: fixed; bottom: 20px; right: 20px; background: var(--orange); color: white; padding: 10px 20px; border-radius: 4px; opacity: 0; transition: 0.3s; z-index: 3000; pointer-events: none; }

@media print {
    body { background: white; color: black; font-family: sans-serif; }
    .fixed-top, main > :not(.active), .btn, .btn-row, .edit-banner, .btn-mod, .btn-del, .s-actions { display: none !important; }
    main { margin-top: 0; padding: 0; }
    .s-card { border: 1px solid #ccc; break-inside: avoid; }
}
</style>
</head>
<body>

<div id="loading"><div style="width:40px;height:40px;border:3px solid #333;border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite"></div><small>CARICAMENTO...</small></div>
<div id="notif">Operazione completata</div>

<div class="fixed-top">
    <div class="header">
        <div class="header-title">■ DESANTIS LAB</div>
    </div>
    <div class="tabs">
        <button id="tab-c" class="tab-btn active" onclick="switchTab('contatti')">Contatti</button>
        <button id="tab-p" class="tab-btn" onclick="switchTab('produzione')">Produzione</button>
        <button id="tab-i" class="tab-btn" onclick="switchTab('incassi')">Incassi</button>
        <button id="tab-s" class="tab-btn" onclick="switchTab('storico')">Storico</button>
    </div>
</div>

<main>
    <section id="panel-contatti" class="panel active">
        <div class="section-card">
            <div class="edit-banner" id="c-banner">MODALITÀ MODIFICA CLIENTE</div>
            <input type="hidden" id="c-eid">
            <div class="form-group"><label class="form-label">Data</label><input type="date" id="c-data" class="form-input"></div>
            <div class="form-group"><label class="form-label">Cliente</label><input type="text" id="c-cliente" class="form-input"></div>
            <div class="form-group"><label class="form-label">Lavorazione</label>
                <select id="c-tipo" class="form-select">
                    <option value="">-- Seleziona --</option>
                    <option>Porte Interne</option><option>Portoncino</option><option>Infissi</option><option>Scale</option>
                    <option>Armadi</option><option>Cucina</option><option>Restauro</option><option>Altro</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Prezzo (€)</label><input type="number" id="c-valore" class="form-input"></div>
            <div class="form-group"><label class="form-label">Stato</label>
                <select id="c-stato" class="form-select">
                    <option>Contatto</option><option>Preventivo</option><option>Lavori in corso</option><option>Consegnato</option><option>Fatturato</option>
                </select>
            </div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetFormC()">Annulla</button>
                <button class="btn btn-save" onclick="saveC()">Salva Cliente</button>
            </div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Cliente</th><th>Lavoro</th><th>Prezzo</th><th>Azioni</th></tr></thead><tbody id="tbody-c"></tbody></table></div>
    </section>

    <section id="panel-produzione" class="panel">
        <div class="section-card">
            <div class="edit-banner" id="p-banner">MODALITÀ MODIFICA LAVORAZIONE</div>
            <input type="hidden" id="p-eid">
            <div class="form-group"><label class="form-label">Data</label><input type="date" id="p-data" class="form-input"></div>
            <div class="form-group"><label class="form-label">Seleziona Cliente</label><select id="p-commessa" class="form-select"></select></div>
            <div class="form-group"><label class="form-label">Operazione Svolta</label>
                <select id="p-operazione" class="form-select">
                    <option value="">-- Seleziona Operazione --</option>
                    <option>Taglio e Sezionatura</option>
                    <option>Bordatura</option>
                    <option>Levigatura</option>
                    <option>Verniciatura</option>
                    <option>Assemblaggio</option>
                    <option>Ferramenta</option>
                    <option>Montaggio Esterno</option>
                    <option>Altro</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Dettagli (opzionale)</label><input type="text" id="p-dettagli" class="form-input" placeholder="Es: ante cucina rover"></div>
            <div class="form-group"><label class="form-label">Operatore</label>
                <select id="p-operatore" class="form-select">
                    <option>Titolare Desantis</option><option>Dipendente Nazzareno</option><option>Dipendente B</option><option>Terzista</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Ore Lavoro</label><input type="number" id="p-ore" class="form-input" step="0.5"></div>
            <div class="form-group"><label class="form-label">% Avanzamento</label><input type="number" id="p-av" class="form-input"></div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetFormP()">Annulla</button>
                <button class="btn btn-save" onclick="saveP()">Salva Registro</button>
            </div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Cliente</th><th>Operazione</th><th>Ore</th><th>Azioni</th></tr></thead><tbody id="tbody-p"></tbody></table></div>
    </section>

    <section id="panel-incassi" class="panel">
        <div class="section-card">
            <div class="edit-banner" id="i-banner">MODALITÀ MODIFICA INCASSO</div>
            <input type="hidden" id="i-eid">
            <div class="form-group"><label class="form-label">Data</label><input type="date" id="i-data" class="form-input"></div>
            <div class="form-group"><label class="form-label">Cliente</label><select id="i-commessa" class="form-select"></select></div>
            <div class="form-group"><label class="form-label">Importo (€)</label><input type="number" id="i-incasso" class="form-input"></div>
            <div class="form-group"><label class="form-label">Stato</label>
                <select id="i-finito" class="form-select"><option value="false">In lavorazione</option><option value="true">Consegnato</option></select>
            </div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetFormI()">Annulla</button>
                <button class="btn btn-save" onclick="saveI()">Registra</button>
            </div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Cliente</th><th>Importo</th><th>Azioni</th></tr></thead><tbody id="tbody-i"></tbody></table></div>
    </section>

    <section id="panel-storico" class="panel">
        <input type="text" id="search-input" class="search-input" style="margin-bottom:15px" placeholder="Cerca cliente..." oninput="renderStorico()">
        <div id="storico-list"></div>
    </section>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://uyzfhilwtikrjqgylxwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5emZoaWx3dGlrcmpxZ3lseHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTYwNDcsImV4cCI6MjA5MDg5MjA0N30._tmP4XpZnK9Wmc3AkkZd52hM_xrmMHIK2EjGTB3xYfQ');

const $ = id => document.getElementById(id);
const loading = on => $('loading').style.display = on ? 'flex' : 'none';
const getToday = () => new Date().toISOString().split('T')[0];

window.switchTab = async (n) => {
    document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
    $('panel-'+n).classList.add('active'); $('tab-'+n.charAt(0)).classList.add('active');
    if(n==='contatti') renderC();
    if(n==='produzione') { await fillSelects('p-commessa'); renderP(); }
    if(n==='incassi') { await fillSelects('i-commessa'); renderI(); }
    if(n==='storico') renderStorico();
};

async function fillSelects(id) {
    const {data} = await sb.from('contatti').select('id,cliente').order('cliente');
    $(id).innerHTML = '<option value="">-- Seleziona --</option>' + (data||[]).map(r => `<option value="${r.id}">${r.cliente}</option>`).join('');
}

// SALVATAGGI CORRETTI
window.saveC = async () => {
    const id = $('c-eid').value;
    const obj = { data: $('c-data').value, cliente: $('c-cliente').value, tipo_lavoro: $('c-tipo').value, valore: parseFloat($('c-valore').value), stato: $('c-stato').value };
    loading(true);
    try {
        if(id) await sb.from('contatti').update(obj).eq('id', id);
        else await sb.from('contatti').insert(obj);
        resetFormC(); await renderC();
    } catch(e) { console.error(e); }
    loading(false);
};

window.saveP = async () => {
    const id = $('p-eid').value;
    const desc = `${$('p-operazione').value} ${$('p-dettagli').value}`.trim();
    const obj = { 
        data: $('p-data').value, 
        contatto_id: $('p-commessa').value, 
        prodotto: desc, 
        operatore: $('p-operatore').value, 
        ore_lavorate: parseFloat($('p-ore').value), 
        avanzamento: parseInt($('p-av').value) 
    };
    if(!obj.contatto_id || !$('p-operazione').value) { alert("Seleziona Cliente e Operazione"); return; }
    loading(true);
    try {
        if(id) await sb.from('produzione').update(obj).eq('id', id);
        else await sb.from('produzione').insert(obj);
        resetFormP(); await renderP();
    } catch(e) { console.error(e); }
    loading(false);
};

window.saveI = async () => {
    const id = $('i-eid').value;
    const obj = { data: $('i-data').value, contatto_id: $('i-commessa').value, incasso: parseFloat($('i-incasso').value), finito: $('i-finito').value === 'true' };
    loading(true);
    try {
        if(id) await sb.from('uscite').update(obj).eq('id', id);
        else await sb.from('uscite').insert(obj);
        resetFormI(); await renderI();
    } catch(e) { console.error(e); }
    loading(false);
};

// RENDERING E MODIFICHE
window.editC = async id => {
    const {data} = await sb.from('contatti').select('*').eq('id',id).single();
    $('c-eid').value = data.id; $('c-data').value = data.data; $('c-cliente').value = data.cliente;
    $('c-tipo').value = data.tipo_lavoro; $('c-valore').value = data.valore; $('c-stato').value = data.stato;
    $('c-banner').classList.add('show');
};
window.editP = async id => {
    const {data} = await sb.from('produzione').select('*').eq('id',id).single();
    await fillSelects('p-commessa');
    $('p-eid').value = data.id; $('p-data').value = data.data; $('p-commessa').value = data.contatto_id;
    $('p-operatore').value = data.operatore; $('p-ore').value = data.ore_lavorate; $('p-av').value = data.avanzamento;
    $('p-banner').classList.add('show');
};

async function renderC() {
    const {data} = await sb.from('contatti').select('*').order('data', {ascending:false});
    $('tbody-c').innerHTML = (data||[]).map(r => `<tr><td>${r.data}</td><td>${r.cliente}</td><td>${r.tipo_lavoro}</td><td>€ ${r.valore}</td><td><button class="btn-mod" onclick="editC(${r.id})">Mod</button></td></tr>`).join('');
}
async function renderP() {
    const {data} = await sb.from('produzione').select('*, contatti(cliente)').order('data', {ascending:false});
    $('tbody-p').innerHTML = (data||[]).map(r => `<tr><td>${r.data}</td><td>${r.contatti?.cliente}</td><td>${r.prodotto}</td><td>${r.ore_lavorate}h</td><td><button class="btn-mod" onclick="editP(${r.id})">Mod</button></td></tr>`).join('');
}
async function renderI() {
    const {data} = await sb.from('uscite').select('*, contatti(cliente)').order('data', {ascending:false});
    $('tbody-i').innerHTML = (data||[]).map(r => `<tr><td>${r.data}</td><td>${r.contatti?.cliente}</td><td>€ ${r.incasso}</td><td><button class="btn-mod" onclick="editI(${r.id})">Mod</button></td></tr>`).join('');
}

async function renderStorico() {
    loading(true);
    const filter = $('search-input').value.toLowerCase();
    const {data: c} = await sb.from('contatti').select('*').order('cliente');
    const {data: p} = await sb.from('produzione').select('*').order('data');
    $('storico-list').innerHTML = c.filter(x => x.cliente.toLowerCase().includes(filter)).map(cl => {
        const logs = p.filter(lx => lx.contatto_id === cl.id);
        return `<div class="s-card"><div class="s-name">${cl.cliente}</div><div class="timeline">${logs.map(l => `<div class="timeline-item"><span class="t-date">${l.data}</span>: ${l.prodotto}</div>`).join('')}</div></div>`;
    }).join('');
    loading(false);
}

window.resetFormC = () => { $('c-eid').value = ''; $('c-banner').classList.remove('show'); $('c-data').value = getToday(); };
window.resetFormP = () => { $('p-eid').value = ''; $('p-banner').classList.remove('show'); $('p-data').value = getToday(); $('p-operazione').value = ""; $('p-dettagli').value = ""; };
window.resetFormI = () => { $('i-eid').value = ''; $('i-banner').classList.remove('show'); $('i-data').value = getToday(); };

$('c-data').value = getToday(); $('p-data').value = getToday(); $('i-data').value = getToday();
renderC();
</script>
</body>
</html>
