<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DESANTIS LAB - Produzione</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* --- STILE PROFESSIONALE DESANTIS --- */
:root {
    --bg: #0d0d0d; --bg-card: #161616; --bg-input: #1e1e1e;
    --orange: #e8692a; --text: #d4c4a8; --text-dim: #8a7a60;
    --border: #2a2a2a; --header-h: 150px;
}
*, *::after, *::before { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Share Tech Mono', monospace; font-size: 14px; 
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* --- LAYOUT FISSO E SCROLL --- */
.fixed-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h); background: var(--bg);
    z-index: 1000; border-bottom: 2px solid var(--orange);
}
.header { text-align: center; padding: 15px 10px 5px; }
.header-title { font-size: 20px; font-weight: 700; color: var(--orange); letter-spacing: 2px; }
.tabs { display: grid; grid-template-columns: repeat(4, 1fr); background: #111; margin-top: 10px; }
.tab-btn { 
    padding: 15px 5px; cursor: pointer; border: none; background: none;
    color: var(--text-dim); font-family: inherit; font-size: 10px; font-weight: 700;
    text-transform: uppercase; border-bottom: 3px solid transparent;
}
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); background: rgba(232,105,42,0.05); }

main { margin-top: var(--header-h); padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 50px; }
.panel { display: none; } .panel.active { display: block; }

/* --- COMPONENTI UI --- */
.section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 15px; margin-bottom: 20px; }
.form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
.form-input, .form-select { 
    width: 100%; background: var(--bg-input); border: 1px solid var(--border); 
    border-radius: 3px; padding: 10px; color: var(--text); font-family: inherit; font-size: 13px;
}
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.btn { padding: 12px; font-family: inherit; font-weight: 700; border-radius: 3px; cursor: pointer; text-transform: uppercase; border: none; }
.btn-save { background: var(--orange); color: white; }
.btn-cancel { background: #333; color: #999; }

/* --- TABELLE --- */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); background: var(--bg-card); border-radius: 4px; }
table { width: 100%; border-collapse: collapse; min-width: 500px; }
th { background: #000; color: var(--orange); font-size: 10px; text-align: left; padding: 12px; }
td { padding: 12px; font-size: 12px; border-bottom: 1px solid #1a1a1a; color: #bbb; }
.btn-mod { color: #6ab0f0; background: none; border: none; cursor: pointer; margin-right: 10px; }
.btn-del { color: #e05050; background: none; border: none; cursor: pointer; }

/* --- STORICO WIP --- */
.s-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 15px; margin-bottom: 15px; }
.wip-bar-bg { background: #333; height: 6px; border-radius: 3px; margin: 10px 0; }
.wip-bar-fill { background: var(--orange); height: 100%; border-radius: 3px; }
.timeline { margin: 15px 0; padding-left: 15px; border-left: 1px dashed var(--orange); }
.t-item { font-size: 11px; margin-bottom: 8px; position: relative; }
.t-item::before { content: ''; position: absolute; left: -19px; top: 4px; width: 7px; height: 7px; background: var(--orange); border-radius: 50%; }

#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; color: var(--orange); font-weight: 700; }
</style>
</head>
<body>

<div id="loading">SINCRONIZZAZIONE...</div>

<div class="fixed-top">
    <div class="header">
        <div class="header-title">■ DESANTIS LAB</div>
    </div>
    <div class="tabs">
        <button id="tab-c" class="tab-btn active" onclick="switchTab('contatti')">Contatti</button>
        <button id="tab-p" class="tab-btn" onclick="switchTab('produzione')">Produzione</button>
        <button id="tab-i" class="tab-btn" onclick="switchTab('incassi')">Incassi</button>
        <button id="tab-s" class="tab-btn" onclick="switchTab('storico')">Storico</button>
    </div>
</div>

<main id="main-content">
    <section id="panel-contatti" class="panel active">
        <div class="section-card">
            <input type="hidden" id="c-eid">
            <div class="form-group"><label class="form-label">Data</label><input type="date" id="c-data" class="form-input"></div>
            <div class="form-group"><label class="form-label">Cliente</label><input type="text" id="c-cliente" class="form-input"></div>
            <div class="form-group"><label class="form-label">Valore (€)</label><input type="number" id="c-valore" class="form-input"></div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetFormC()">Annulla</button>
                <button class="btn btn-save" onclick="saveC()">Salva</button>
            </div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Prezzo</th><th>Azioni</th></tr></thead><tbody id="tbody-c"></tbody></table></div>
    </section>

    <section id="panel-produzione" class="panel">
        <div class="section-card">
            <input type="hidden" id="p-eid">
            <div class="form-group"><label class="form-label">Data</label><input type="date" id="p-data" class="form-input"></div>
            <div class="form-group"><label class="form-label">Cliente</label><select id="p-commessa" class="form-select"></select></div>
            <div class="form-group"><label class="form-label">Lavorazione</label>
                <select id="p-operazione-std" class="form-select">
                    <option>Taglio e Sezionatura</option><option>Bordatura</option><option>Levigatura</option>
                    <option>Verniciatura</option><option>Assemblaggio</option><option>Ferramenta</option>
                    <option>Montaggio Esterno</option><option>Altro</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Note</label><input type="text" id="p-note" class="form-input"></div>
            <div class="form-group"><label class="form-label">Operatore</label>
                <select id="p-operatore" class="form-select">
                    <option>Titolare Desantis</option><option>Nazzareno</option>
                    <option>Dipendente B</option><option>Terzista</option><option>Altro</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Ore</label><input type="number" id="p-ore" class="form-input" step="0.5"></div>
            <div class="form-group"><label class="form-label">% Avanzamento</label><input type="number" id="p-av" class="form-input"></div>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="resetFormP()">Annulla</button>
                <button class="btn btn-save" onclick="saveP()">Registra</button>
            </div>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Cliente</th><th>Cosa</th><th>Azioni</th></tr></thead><tbody id="tbody-p"></tbody></table></div>
    </section>

    <section id="panel-incassi" class="panel">
        <div class="section-card"><p>Modulo incassi attivo. Registra qui i pagamenti ricevuti dai clienti.</p></div>
    </section>

    <section id="panel-storico" class="panel">
        <div id="storico-list"></div>
    </section>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://uyzfhilwtikrjqgylxwg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5emZoaWx3dGlrcmpxZ3lseHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTYwNDcsImV4cCI6MjA5MDg5MjA0N30._tmP4XpZnK9Wmc3AkkZd52hM_xrmMHIK2EjGTB3xYfQ');

const $ = id => document.getElementById(id);
const loading = on => $('loading').style.display = on ? 'flex' : 'none';

window.switchTab = async (n) => {
    document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
    $('panel-'+n).classList.add('active'); $('tab-'+n.charAt(0)).classList.add('active');
    if(n==='contatti') renderC();
    if(n==='produzione') { await fillSels('p-commessa'); renderP(); }
    if(n==='storico') renderStorico();
};

async function fillSels(id) {
    const {data} = await sb.from('contatti').select('id,cliente').order('cliente');
    $(id).innerHTML = (data||[]).map(r => `<option value="${r.id}">${r.cliente}</option>`).join('');
}

// SALVATAGGIO PRODUZIONE (FIXED)
window.saveP = async () => {
    const id = $('p-eid').value;
    const desc = `${$('p-operazione-std').value}: ${$('p-note').value}`;
    
    // Proviamo a inviare l'operazione in tutte le possibili colonne per evitare il "mancato salvataggio"
    const obj = { 
        data: $('p-data').value, 
        contatto_id: $('p-commessa').value, 
        operatore: $('p-operatore').value, 
        ore_lavorate: parseFloat($('p-ore').value), 
        avanzamento: parseInt($('p-av').value),
        prodotto: desc,   // Tentativo 1
        operazione: desc  // Tentativo 2
    };

    loading(true);
    let res;
    if(id) res = await sb.from('produzione').update(obj).eq('id', id);
    else res = await sb.from('produzione').insert(obj);
    
    if(res.error) alert("Errore Database: " + res.error.message);
    else { resetFormP(); renderP(); }
    loading(false);
};

window.saveC = async () => {
    const obj = { data: $('c-data').value, cliente: $('c-cliente').value, valore: $('c-valore').value };
    loading(true); await sb.from('contatti').insert(obj); renderC(); loading(false); resetFormC();
};

async function renderC() {
    const {data} = await sb.from('contatti').select('*').order('id', {ascending:false});
    $('tbody-c').innerHTML = (data||[]).map(r => `<tr><td>${r.cliente}</td><td>€ ${r.valore}</td><td><button class="btn-del" onclick="delC(${r.id})">✕</button></td></tr>`).join('');
}

async function renderP() {
    const {data} = await sb.from('produzione').select('*, contatti(cliente)').order('id', {ascending:false});
    $('tbody-p').innerHTML = (data||[]).map(r => `<tr><td>${r.data}</td><td>${r.contatti?.cliente}</td><td>${r.prodotto || r.operazione}</td><td><button class="btn-del" onclick="delP(${r.id})">✕</button></td></tr>`).join('');
}

async function renderStorico() {
    const {data: c} = await sb.from('contatti').select('*');
    const {data: p} = await sb.from('produzione').select('*').order('data');
    $('storico-list').innerHTML = c.map(cl => {
        const logs = p.filter(l => l.contatto_id === cl.id);
        const avMax = logs.length > 0 ? Math.max(...logs.map(l => l.avanzamento)) : 0;
        return `<div class="s-card"><b>${cl.cliente}</b><div class="wip-bar-bg"><div class="wip-bar-fill" style="width:${avMax}%"></div></div><div class="timeline">${logs.map(l => `<div class="t-item">${l.data}: ${l.prodotto || l.operazione} (${l.operatore})</div>`).join('')}</div></div>`;
    }).join('');
}

window.resetFormP = () => { $('p-eid').value = ''; $('p-note').value = ''; $('p-ore').value = ''; $('p-av').value = ''; $('p-data').value = new Date().toISOString().split('T')[0]; };
window.resetFormC = () => { $('c-eid').value = ''; $('c-cliente').value = ''; $('c-valore').value = ''; $('c-data').value = new Date().toISOString().split('T')[0]; };
window.delC = async id => { if(confirm('Elimina?')) { await sb.from('contatti').delete().eq('id', id); renderC(); } };
window.delP = async id => { if(confirm('Elimina?')) { await sb.from('produzione').delete().eq('id', id); renderP(); } };

$('c-data').value = new Date().toISOString().split('T')[0];
$('p-data').value = new Date().toISOString().split('T')[0];
renderC();
</script>
</body>
</html>
