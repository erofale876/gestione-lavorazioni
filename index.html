<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desantis Gestione - Turbo</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Stili ottimizzati per velocità e resa mobile */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0d0902; --card: #1a1208; --border: #3a2510; --orange: #e8692a; --text: #d4c4a8; --text2: #a08060; --mono: 'Share Tech Mono', monospace; }
        body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; line-height: 1.4; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--orange); background: #000; }
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); background: #1a1208; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 12px 5px; cursor: pointer; background: none; border: none; color: var(--text2); font-family: var(--mono); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); background: rgba(232, 105, 42, 0.1); }
        main { max-width: 900px; margin: 0 auto; padding: 15px; }
        .panel { display: none; } .panel.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 4px; margin-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 10px; color: var(--orange); text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { background: #000; border: 1px solid var(--border); padding: 10px; color: #fff; font-family: var(--mono); border-radius: 3px; }
        .btn { width: 100%; padding: 12px; background: var(--orange); border: none; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 3px; margin-top: 5px; }
        .btn:active { transform: scale(0.98); }
        .table-wrap { overflow-x: auto; background: var(--card); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 10px; background: #000; color: var(--orange); border-bottom: 1px solid var(--orange); }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.3s; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #notif { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--orange); color: #000; padding: 8px 20px; border-radius: 20px; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 10001; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <div id="load-msg" style="font-size: 11px; letter-spacing: 1px;">SINCRONIZZAZIONE...</div>
</div>

<div id="notif">OPERAZIONE COMPLETATA</div>

<div class="header">
    <h2 style="color:var(--orange); font-size: 18px; letter-spacing: 2px;">DESANTIS CLOUD v2.0</h2>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('contatti', this)">Contatti</button>
    <button class="tab-btn" onclick="switchTab('produzione', this)">Produzione</button>
    <button class="tab-btn" onclick="switchTab('incassi', this)">Incassi</button>
    <button class="tab-btn" onclick="switchTab('storico', this)">Storico</button>
</div>

<main>
    <div id="panel-contatti" class="panel active">
        <div class="card">
            <label>Nuova Commessa / Cliente</label>
            <div class="form-row">
                <div class="form-group"><label>Cliente</label><input type="text" id="c-cliente" placeholder="Nome"></div>
                <div class="form-group">
                    <label>Lavorazione</label>
                    <select id="c-tipo">
                        <option>Cucina</option><option>Armadio</option><option>Porte</option><option>Infissi</option><option>Altro</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Preventivo €</label><input type="number" id="c-valore"></div>
                <div class="form-group"><label>Ore Previste</label><input type="number" id="c-ore"></div>
            </div>
            <button class="btn" onclick="saveC()">Salva Contatto</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Cliente</th><th>Lavoro</th><th>Status</th></tr></thead>
                <tbody id="tbody-c"></tbody>
            </table>
        </div>
    </div>

    <div id="panel-produzione" class="panel">
        <div class="card">
            <label>Registrazione Lavoro Giornaliero</label>
            <div class="form-row">
                <div class="form-group"><label>Seleziona Cliente</label><select id="p-commessa"></select></div>
                <div class="form-group">
                    <label>Operazione Svolta</label>
                    <select id="p-prodotto">
                        <option>Taglio e Sezionatura</option><option>Bordatura</option><option>Levigatura</option>
                        <option>Verniciatura</option><option>Assemblaggio</option><option>Ferramenta</option>
                        <option>Montaggio Esterno</option><option>Altro</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Ore Lavorate</label><input type="number" id="p-ore" step="0.5"></div>
                <div class="form-group">
                    <label>Operatore</label>
                    <select id="p-operatore"><option>Titolare</option><option>Nazzareno</option><option>Altro</option></select>
                </div>
            </div>
            <button class="btn" onclick="saveP()">Registra Ore</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Data</th><th>Cliente</th><th>Lavoro</th><th>Ore</th></tr></thead>
                <tbody id="tbody-p"></tbody>
            </table>
        </div>
    </div>
    
    <div id="panel-incassi" class="panel"><div class="card">Gestione Incassi in caricamento...</div></div>
    <div id="panel-storico" class="panel"><div class="card">Storico Generale in caricamento...</div></div>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPA_URL = 'https://uyzfhilwtikrjqgylxwg.supabase.co';
const SUPA_KEY = 'YOUR_API_KEY_HERE';  // Non includere la chiave direttamente
const sb = createClient(SUPA_URL, SUPA_KEY);

let schemaHasOrePreviste = true; // Memoizzazione automatica

function toggleLoad(show, msg = "SINCRONIZZAZIONE...") {
    const loader = document.getElementById('loading');
    document.getElementById('load-msg').textContent = msg;
    show ? loader.classList.remove('hidden') : loader.classList.add('hidden');
}

function toast(m) {
    const n = document.getElementById('notif');
    n.textContent = m; n.style.opacity = 1;
    setTimeout(() => n.style.opacity = 0, 2500);
}

async function fastSave(table, payload) {
    toggleLoad(true, "INVIO DATI...");
    
    // Se sappiamo già che la colonna non esiste, la togliamo subito
    if (!schemaHasOrePreviste && payload.ore_previste !== undefined) {
        delete payload.ore_previste;
    }

    try {
        let { error } = await sb.from(table).insert(payload);
        
        // Se è il primo tentativo e fallisce per colonna mancante
        if (error && (error.code === '42703' || error.message.includes('ore_previste'))) {
            console.warn("Schema Alert: Colonna ore_previste mancante. Ottimizzo per i prossimi invii.");
            schemaHasOrePreviste = false; 
            delete payload.ore_previste;
            const retry = await sb.from(table).insert(payload);
            if (retry.error) throw retry.error;
        } else if (error) {
            throw error;
        }
        
        toast("SALVATO CON SUCCESSO");
        return true;
    } catch (e) {
        alert("Errore Server: " + e.message);
        return false;
    } finally {
        toggleLoad(false);
    }
}

window.saveC = async () => {
    const p = {
        cliente: document.getElementById('c-cliente').value.trim(),
        tipo_lavoro: document.getElementById('c-tipo').value,
        valore: parseFloat(document.getElementById('c-valore').value) || 0,
        ore_previste: parseFloat(document.getElementById('c-ore').value) || 0,
        data: new Date().toISOString().split('T')[0]
    };
    if (!p.cliente) {
        alert("Il nome del cliente è obbligatorio!");
        return;
    }
    if (p.valore < 0 || p.ore_previste < 0) {
        alert("I valori di Preventivo e Ore Previste devono essere positivi.");
        return;
    }
    if (await fastSave('contatti', p)) {
        document.getElementById('c-cliente').value = '';
        renderC();
    }
};

window.saveP = async () => {
    const p = {
        contatto_id: document.getElementById('p-commessa').value,
        prodotto: document.getElementById('p-prodotto').value,
        ore_lavorate: parseFloat(document.getElementById('p-ore').value) || 0,
        operatore: document.getElementById('p-operatore').value,
        data: new Date().toISOString().split('T')[0]
    };
    if (p.ore_lavorate <= 0) {
        alert("Le ore lavorate devono essere positive.");
        return;
    }
    if (await fastSave('produzione', p)) {
        document.getElementById('p-ore').value = '';
        renderP();
    }
};

async function renderC() {
    const { data, error } = await sb.from('contatti').select('*').order('id', {ascending: false}).limit(20);
    if (error) {
        alert("Errore nel caricamento dei contatti: " + error.message);
        return;
    }
    const tbody = document.getElementById('tbody-c');
    tbody.innerHTML = (data || []).map(r => `<tr><td>${r.cliente}</td><td>${r.tipo_lavoro}</td><td>${r.stato || 'OK'}</td></tr>`).join('');
    
    const sel = document.getElementById('p-commessa');
    sel.innerHTML = (data || []).map(r => `<option value="${r.id}">${r.cliente}</option>`).join('');
}

async function renderP() {
    const { data, error } = await sb.from('produzione').select('*, contatti(cliente)').order('id', {ascending: false}).limit(20);
    if (error) {
        alert("Errore nel caricamento della produzione: " + error.message);
        return;
    }
    document.getElementById('tbody-p').innerHTML = (data || []).map(r => `
        <tr><td>${r.data}</td><td>${r.contatti?.cliente || '???'}</td><td>${r.prodotto}</td><td>${r.ore_lavorate}</td></tr>
    `).join('');
}

window.switchTab = (name, btn) => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'contatti') renderC();
    if (name === 'produzione') renderP();
};

// Partenza rapida
(async () => {
    await renderC();
    toggleLoad(false);
})();
</script>
</body>
</html>
